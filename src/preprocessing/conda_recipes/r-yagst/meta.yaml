{% set version = '1.0.1' %}
{% set name = "yagst" %}
{% set posix = 'm2-' if win else '' %}
{% set native = 'm2w64-' if win else '' %}

package:
  name: r-yagst
  version: "2017.08.25"

source:
  git_url: https://github.com/miccec/yaGST.git
  git_depth: 1 # (Defaults to -1/not shallow)

build:
  number: 1
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  host:
    - r-base
    - r-ggplot2
    - r-doparallel
  run:
    - r-base
    - r-ggplot2
    - r-doparallel
test:
  commands:
    - $R -e "library('yaGST')" # [not win]
    - "\"%R%\" -e \"library('yaGST')\"" # [win]

about:
  home: https://r-forge.r-project.org
  license: GPL-3
  summary: This is a collection of wrappers to the Wilcoxon test to run competitive gene set tests and comparison between imbalanced datasets.
extra:
  recipe-maintainers:
    - Santiago García-Martín