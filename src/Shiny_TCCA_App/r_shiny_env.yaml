name: r_shiny_env
channels:
  - conda-forge
  - bioconda
dependencies:
  - r-base
  - r-gridExtra
  - r-shiny
  - r-shinydashboard
  - r-dt
  - r-dplyr
  - r-seurat
  - r-seuratobject
  - r-seuratdisk
  - r-ggplot2
  - r-hdf5r
  - pandoc  # Requerido por shiny a veces
  - r-devtools  # Útil para instalaciones desde GitHub, opcional


# To create the conda environment, run the following command in your terminal:-----------------------------------------------------------
# conda env create -f r_shiny_env.yaml
# To activate the environment, run:
# conda activate r_shiny_env

